<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1f2e" id="meta-theme-color">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>To-Do</title>
    <script>
        // Restore theme before paint to prevent flash
        if (localStorage.getItem('todo-theme') === 'light') {
            document.documentElement.classList.add('light');
            document.addEventListener('DOMContentLoaded', function() {
                var mc = document.getElementById('meta-theme-color');
                if (mc) mc.content = '#f2f2f4';
            });
        }
    </script>
    <link rel="manifest" href="/manifest.json">
    <style>
        @layer reset, tokens, base, components;

        @layer reset {
            *, *::before, *::after { box-sizing: border-box; margin: 0; }
            body { line-height: 1.5; -webkit-font-smoothing: antialiased; }
            button { font: inherit; }
        }

        @layer tokens {
            :root {
                --color-bg: oklch(0.14 0.025 250);
                --color-surface: oklch(0.18 0.025 250);
                --color-surface-hover: oklch(0.22 0.025 250);
                --color-surface-raised: oklch(0.26 0.025 250);
                --color-surface-overlay: oklch(0.30 0.025 250);
                --color-text: oklch(0.93 0.01 250);
                --color-text-secondary: oklch(0.75 0.01 250);
                --color-text-muted: oklch(0.55 0.015 250);
                --color-text-disabled: oklch(0.40 0.01 250);
                --color-border: oklch(1 0 0 / 0.08);
                --color-border-emphasis: oklch(1 0 0 / 0.15);
                --color-border-strong: oklch(1 0 0 / 0.25);
                --color-accent: oklch(0.75 0.17 178);
                --color-secondary: oklch(0.72 0.18 320);
                --accent-muted: oklch(0.75 0.17 178 / 0.15);
                --accent-subtle: oklch(0.75 0.17 178 / 0.08);
                --color-success: oklch(0.72 0.17 145);
                --color-warning: oklch(0.80 0.16 85);
                --color-danger: oklch(0.70 0.19 25);
                --color-heading: oklch(0.78 0.15 178);
                --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
                --font-mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Segoe UI Mono', monospace;
                --text-xs: clamp(0.6875rem, 0.625rem + 0.25vw, 0.8125rem);
                --text-sm: clamp(0.8125rem, 0.75rem + 0.25vw, 0.9375rem);
                --text-base: clamp(0.9375rem, 0.875rem + 0.25vw, 1.0625rem);
                --text-lg: clamp(1.125rem, 1rem + 0.5vw, 1.375rem);
                --text-xl: clamp(1.375rem, 1.125rem + 1vw, 1.875rem);
                --space-xs: clamp(0.25rem, 0.2rem + 0.2vw, 0.5rem);
                --space-sm: clamp(0.5rem, 0.4rem + 0.4vw, 0.875rem);
                --space-md: clamp(1rem, 0.875rem + 0.5vw, 1.5rem);
                --space-lg: clamp(1.5rem, 1.25rem + 1vw, 2.5rem);
                --ease-out: cubic-bezier(0, 0, 0.2, 1);
                --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
                --duration-fast: 150ms;
                --duration-normal: 250ms;
                --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.3);
                --shadow-md: 0 4px 12px oklch(0 0 0 / 0.4);
            }
        }

        /* ── Light Mode (style guide: class-based toggle) ── */
        :root.light {
            --color-accent: oklch(0.52 0.18 178);
            --color-secondary: oklch(0.50 0.19 320);
            --accent-muted: oklch(0.52 0.18 178 / 0.12);
            --accent-subtle: oklch(0.52 0.18 178 / 0.06);
            --color-bg: oklch(0.955 0.005 250);
            --color-surface: oklch(1 0 0);
            --color-surface-hover: oklch(0.97 0.003 250);
            --color-surface-raised: oklch(1 0 0);
            --color-surface-overlay: oklch(1 0 0);
            --color-text: oklch(0.16 0.02 250);
            --color-text-secondary: oklch(0.35 0.015 250);
            --color-text-muted: oklch(0.50 0.01 250);
            --color-text-disabled: oklch(0.68 0.005 250);
            --color-border: oklch(0 0 0 / 0.08);
            --color-border-emphasis: oklch(0 0 0 / 0.15);
            --color-border-strong: oklch(0 0 0 / 0.25);
            --color-success: oklch(0.52 0.17 145);
            --color-warning: oklch(0.60 0.16 85);
            --color-danger: oklch(0.52 0.19 25);
            --color-heading: oklch(0.38 0.15 178);
            --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.06);
            --shadow-md: 0 4px 12px oklch(0 0 0 / 0.08);
        }

        @layer base {
            body {
                font-family: var(--font-sans);
                background-color: var(--color-bg);
                color: var(--color-text);
                line-height: 1.6;
                min-height: 100vh;
                min-height: 100dvh;
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
            body::before {
                content: '';
                position: fixed;
                inset: 0;
                pointer-events: none;
                background: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
                background-size: 60px 60px;
                mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
            }
            html::after {
                content: '';
                position: fixed;
                inset: 0;
                opacity: 0.018;
                mix-blend-mode: overlay;
                pointer-events: none;
                z-index: 9999;
                background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E") repeat;
                background-size: 256px 256px;
            }
        }

        @layer components {
            .container {
                position: relative;
                z-index: 1;
                max-width: 640px;
                margin: 0 auto;
                padding: 0 var(--space-md) 40px;
            }

            /* ── Header ──────────────────────────────── */
            header {
                position: sticky;
                top: 0;
                z-index: 10;
                background: oklch(0.14 0.025 250 / 0.85);
                backdrop-filter: blur(24px) saturate(1.2);
                -webkit-backdrop-filter: blur(24px) saturate(1.2);
                border-bottom: 1px solid var(--color-border);
                margin: 0 calc(var(--space-md) * -1);
                padding: 0 var(--space-md);
            }
            :root.light header { background: oklch(0.955 0.005 250 / 0.85); }
            .accent-bar {
                height: 3px;
                background: linear-gradient(90deg, var(--color-accent), var(--color-secondary));
            }
            .header-inner {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 14px 0;
            }
            .header-left h1 {
                font-size: var(--text-lg);
                font-weight: 700;
                letter-spacing: -0.03em;
            }
            .header-date {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-text-muted);
                margin-top: 1px;
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .sync-status {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-text-secondary);
            }
            .sync-status.stale { color: var(--color-warning); }
            .sync-status.error { color: var(--color-danger); }
            .refresh-btn {
                width: 32px;
                height: 32px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 8px;
                color: var(--color-text-secondary);
                cursor: pointer;
                transition: all var(--duration-fast) var(--ease-out);
                font-size: 14px;
            }
            .refresh-btn:hover { color: var(--color-text); border-color: var(--color-border-emphasis); }
            .refresh-btn:active { transform: scale(0.92); }
            .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
            @keyframes spin { to { transform: rotate(360deg); } }

            /* ── Toolbar ─────────────────────────────── */
            .toolbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: var(--space-sm) 0 4px;
                gap: 8px;
            }
            .filter-group {
                display: flex;
                gap: 2px;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 8px;
                padding: 3px;
            }
            .filter-btn {
                font-size: var(--text-xs);
                font-weight: 600;
                color: var(--color-text-muted);
                background: transparent;
                border: none;
                padding: 5px 12px;
                border-radius: 5px;
                cursor: pointer;
                transition: all var(--duration-fast) var(--ease-out);
            }
            .filter-btn:hover { color: var(--color-text-secondary); }
            .filter-btn.active {
                color: var(--color-text);
                background: var(--color-surface-hover);
                box-shadow: var(--shadow-sm);
            }
            .item-count {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-text-muted);
                white-space: nowrap;
            }
            .flat-toggle {
                width: 28px;
                height: 28px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 6px;
                color: var(--color-text-muted);
                cursor: pointer;
                font-size: 12px;
                transition: all var(--duration-fast) var(--ease-out);
                flex-shrink: 0;
            }
            .flat-toggle:hover { color: var(--color-text); border-color: var(--color-border-emphasis); }
            .flat-toggle.active { color: var(--color-accent); border-color: var(--color-accent); background: var(--accent-subtle); }

            /* ── Search (inline in toolbar) ─────────── */
            .search-inline {
                position: relative;
                flex: 1;
                max-width: 160px;
            }
            .search-inline .search-icon {
                position: absolute;
                left: 8px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--color-text-muted);
                font-size: 11px;
                pointer-events: none;
            }
            .search-inline .search-input {
                width: 100%;
                padding: 5px 8px 5px 26px;
                font-family: var(--font-sans);
                font-size: var(--text-xs);
                color: var(--color-text);
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 6px;
                outline: none;
                transition: border-color var(--duration-fast) var(--ease-out), max-width var(--duration-normal) var(--ease-out);
            }
            .search-inline .search-input::placeholder { color: var(--color-text-disabled); }
            .search-inline .search-input:focus { border-color: var(--color-border-emphasis); max-width: 200px; }

            /* ── Add Task ────────────────────────────── */
            .add-task-bar {
                display: flex;
                gap: 8px;
                margin-bottom: var(--space-sm);
            }
            .add-task-input {
                flex: 1;
                padding: 10px 14px;
                font-family: var(--font-sans);
                font-size: var(--text-sm);
                color: var(--color-text);
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 10px;
                outline: none;
                transition: border-color var(--duration-fast) var(--ease-out);
            }
            .add-task-input::placeholder { color: var(--color-text-disabled); }
            .add-task-input:focus { border-color: var(--color-accent); }
            .add-task-btn {
                padding: 0 18px;
                font-size: var(--text-sm);
                font-weight: 600;
                color: oklch(0.15 0 0);
                background: var(--color-accent);
                border: none;
                border-radius: 10px;
                cursor: pointer;
                transition: all var(--duration-fast) var(--ease-out);
                white-space: nowrap;
            }
            .add-task-btn:hover { filter: brightness(1.1); }
            .add-task-btn:active { transform: scale(0.96); }
            .add-task-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none;
                filter: none;
            }

            /* ── Todo List ───────────────────────────── */
            .todo-list { padding-top: 2px; }
            .todo-row.dragging { opacity: 0.4; }
            .todo-row.drag-over-above { border-top: 2px solid var(--color-accent); margin-top: -2px; }
            .todo-row.drag-over-below { border-bottom: 2px solid var(--color-accent); margin-bottom: 2px; }
            .drag-handle {
                display: none;
                align-items: center;
                color: var(--color-text-disabled);
                cursor: grab;
                font-size: 14px;
                flex-shrink: 0;
                padding: 0 2px;
                user-select: none;
            }
            .drag-handle:active { cursor: grabbing; }
            .flat-mode .drag-handle { display: flex; }
            .divider-row {
                justify-content: center;
                padding: 6px 16px;
                background: transparent;
                border: 1px dashed var(--color-border-emphasis);
                cursor: default;
            }
            .divider-row:hover { background: var(--color-surface); }
            .divider-label {
                flex: 1;
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-text-muted);
                text-align: center;
                outline: none;
                min-width: 20px;
            }
            .divider-label:focus { color: var(--color-text); border-bottom: 1px solid var(--color-accent); }
            .divider-delete {
                color: var(--color-text-disabled);
                cursor: pointer;
                font-size: 16px;
                padding: 0 4px;
                transition: color var(--duration-fast);
            }
            .divider-delete:hover { color: var(--color-danger); }
            .add-divider-btn {
                display: block;
                width: 100%;
                padding: 8px;
                margin-top: 8px;
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-text-muted);
                background: transparent;
                border: 1px dashed var(--color-border);
                border-radius: 10px;
                cursor: pointer;
                transition: all var(--duration-fast) var(--ease-out);
            }
            .add-divider-btn:hover { color: var(--color-text-secondary); border-color: var(--color-border-emphasis); }
            .group-heading {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: var(--space-md) 0 var(--space-xs);
            }
            .group-heading:first-child { padding-top: var(--space-sm); }
            .group-heading h3 {
                font-size: var(--text-sm);
                font-weight: 600;
                color: var(--color-heading);
                letter-spacing: -0.01em;
            }
            .group-heading .badge {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-text-muted);
                background: var(--color-surface);
                padding: 1px 7px;
                border-radius: 999px;
            }

            .todo-row {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                padding: 12px 16px;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 14px;
                margin-bottom: 4px;
                cursor: pointer;
                transition: all var(--duration-fast) var(--ease-out);
                -webkit-tap-highlight-color: transparent;
            }
            .todo-row:hover { background: var(--color-surface-hover); }
            .todo-row:active { transform: scale(0.99); }
            .todo-pip {
                width: 3px;
                min-height: 20px;
                align-self: stretch;
                background: var(--color-accent);
                border-radius: 2px;
                flex-shrink: 0;
            }
            .todo-pip.pip-blue { background: oklch(0.65 0.28 260); }
            .todo-pip.pip-purple { background: oklch(0.60 0.30 320); }
            .todo-pip.pip-red { background: oklch(0.60 0.28 28); }
            .todo-pip.pip-green { background: oklch(0.65 0.26 145); }

            /* ── Pip Color Menu ─────────────────────── */
            .pip-menu {
                position: fixed;
                z-index: 100;
                background: var(--color-surface);
                border: 1px solid var(--color-border-emphasis);
                border-radius: 10px;
                padding: 6px;
                display: flex;
                gap: 6px;
                box-shadow: var(--shadow-md);
            }
            .pip-menu-dot {
                width: 20px;
                height: 20px;
                border-radius: 50%;
                cursor: pointer;
                border: 2px solid transparent;
                transition: transform var(--duration-fast) var(--ease-spring), border-color var(--duration-fast);
            }
            .pip-menu-dot:hover { transform: scale(1.2); }
            .pip-menu-dot.selected { border-color: var(--color-text); }
            .pip-menu-dot.dot-green { background: oklch(0.65 0.26 145); }
            .pip-menu-dot.dot-blue { background: oklch(0.65 0.28 260); }
            .pip-menu-dot.dot-purple { background: oklch(0.60 0.30 320); }
            .pip-menu-dot.dot-red { background: oklch(0.60 0.28 28); }

            /* ── Requester Tag ────────────────────────── */
            .requester-tag {
                font-size: 10px;
                font-weight: 500;
                letter-spacing: 0.02em;
                padding: 1px 6px;
                border-radius: 4px;
                background: oklch(1 0 0 / 0.06);
                color: var(--color-text-muted);
                white-space: nowrap;
                flex-shrink: 0;
                margin-left: auto;
                margin-right: 2px;
                line-height: 1.6;
            }
            .requester-menu {
                position: fixed;
                z-index: 100;
                background: var(--color-surface);
                border: 1px solid var(--color-border-emphasis);
                border-radius: 8px;
                padding: 4px;
                display: flex;
                flex-direction: column;
                gap: 1px;
                box-shadow: var(--shadow-md);
                min-width: 90px;
            }
            .requester-menu-item {
                padding: 5px 10px;
                font-size: 12px;
                cursor: pointer;
                border-radius: 5px;
                color: var(--color-text-secondary);
                transition: background var(--duration-fast), color var(--duration-fast);
            }
            .requester-menu-item:hover { background: var(--color-surface-hover); color: var(--color-text); }
            .requester-menu-item.selected { color: var(--color-accent); }
            .todo-check {
                width: 22px;
                height: 22px;
                flex-shrink: 0;
                border-radius: 6px;
                border: 2px solid var(--color-border-emphasis);
                background: var(--color-surface-hover);
                transition: all var(--duration-fast) var(--ease-spring);
                position: relative;
            }
            .todo-check.checked {
                background: var(--accent-muted);
                border-color: var(--color-accent);
                transform: scale(0.9);
            }
            .todo-check.checked::after {
                content: '';
                position: absolute;
                top: 3px;
                left: 6px;
                width: 5px;
                height: 10px;
                border: solid var(--color-accent);
                border-width: 0 2.5px 2.5px 0;
                transform: rotate(45deg);
            }
            .todo-text {
                font-size: var(--text-sm);
                line-height: 1.5;
                color: var(--color-text);
                flex: 1;
                padding-top: 1px;
            }
            .todo-row.completed .todo-text {
                color: var(--color-text-muted);
                text-decoration: line-through;
                text-decoration-color: var(--color-text-disabled);
            }
            .todo-row.completed .todo-pip { display: none; }
            .todo-row.completed {
                background: transparent;
                border-color: transparent;
                opacity: 0.7;
            }
            .todo-row.completed:hover { background: var(--color-surface); opacity: 1; }
            :root.light .todo-row.completed:hover { opacity: 0.8; }

            /* ── Completed Toggle ────────────────────── */
            .completed-divider {
                height: 1px;
                background: var(--color-border);
                margin: var(--space-md) 0 0;
            }
            .completed-toggle {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 0;
                cursor: pointer;
                user-select: none;
                -webkit-tap-highlight-color: transparent;
            }
            .completed-toggle:hover .toggle-label { color: var(--color-text); }
            .toggle-arrow {
                font-size: 11px;
                color: var(--color-text-secondary);
                transition: transform var(--duration-fast) var(--ease-out);
                display: inline-block;
            }
            .toggle-arrow.open { transform: rotate(90deg); }
            .toggle-label {
                font-size: var(--text-sm);
                font-weight: 600;
                color: var(--color-text-secondary);
                transition: color var(--duration-fast) var(--ease-out);
            }
            .toggle-badge {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-accent);
                background: var(--accent-subtle);
                padding: 2px 8px;
                border-radius: 999px;
            }
            .completed-list {
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.35s var(--ease-out);
            }
            .completed-list.open {
                max-height: 3000px;
            }

            /* ── Skeleton Loading ────────────────────── */
            .skeleton-group { padding-top: var(--space-md); }
            .skeleton-heading {
                width: 140px;
                height: 16px;
                background: var(--color-surface-hover);
                border-radius: 8px;
                margin-bottom: var(--space-sm);
            }
            .skeleton-row {
                height: 48px;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 14px;
                margin-bottom: 4px;
                overflow: hidden;
                position: relative;
            }
            .skeleton-row::after {
                content: '';
                position: absolute;
                inset: 0;
                background: linear-gradient(90deg, transparent 25%, var(--color-surface-hover) 50%, transparent 75%);
                background-size: 200% 100%;
                animation: shimmer 1.5s ease-in-out infinite;
            }
            @keyframes shimmer {
                0% { background-position: 200% 0; }
                100% { background-position: -200% 0; }
            }

            /* ── States ──────────────────────────────── */
            .state-msg {
                text-align: center;
                padding: 48px 0;
            }
            .state-msg h3 {
                font-size: var(--text-base);
                color: var(--color-text-secondary);
                font-weight: 500;
            }
            .state-msg p {
                font-size: var(--text-sm);
                color: var(--color-text-muted);
                margin-top: var(--space-xs);
            }

            /* ── Footer ──────────────────────────────── */
            .footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 12px 0;
                margin-top: var(--space-sm);
                border-top: 1px solid var(--color-border);
            }
            .footer-count {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-text-secondary);
            }
            .footer-note {
                font-size: var(--text-xs);
                color: var(--color-text-muted);
            }

            /* ── Responsive ──────────────────────────── */
            @media (max-width: 480px) {
                .container { padding: 0 12px 32px; }
                header { margin: 0 -12px; padding: 0 12px; }
                .todo-row { padding: 12px; gap: 10px; }
                .todo-check { width: 24px; height: 24px; }
                .todo-check.checked::after { top: 4px; left: 7px; }
                .filter-btn { padding: 6px 10px; }
                .footer { flex-direction: column; gap: 4px; align-items: flex-start; }
            }
            /* ── Swipe-to-complete ───────────────── */
            .todo-row-wrapper {
                position: relative;
                overflow: hidden;
                border-radius: 14px;
                margin-bottom: 4px;
            }
            .swipe-bg {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                padding-left: 20px;
                font-size: 22px;
                color: white;
                border-radius: 14px;
                background: var(--color-success);
                opacity: 0;
                transition: opacity 0.15s;
                pointer-events: none;
            }
            .swipe-bg.visible { opacity: 1; }
            .todo-row-wrapper .todo-row { margin-bottom: 0; transition: transform 0.15s var(--ease-out); }

            /* ── Star / Pin ─────────────────────────── */
            .star-btn {
                flex-shrink: 0;
                background: none;
                border: none;
                font-size: 18px;
                cursor: pointer;
                color: var(--color-text-disabled);
                padding: 0 2px;
                line-height: 1;
                opacity: 0;
                transition: color var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-spring), opacity var(--duration-fast);
            }
            .todo-row:hover .star-btn, .star-btn:focus { opacity: 1; }
            .star-btn:hover { color: var(--color-warning); transform: scale(1.15); opacity: 1; }
            .star-btn.pinned { color: var(--color-warning); opacity: 1; }

            /* ── Inline Edit ────────────────────────── */
            .todo-text-edit {
                font-family: var(--font-sans);
                font-size: var(--text-sm);
                line-height: 1.5;
                color: var(--color-text);
                background: var(--color-surface-hover);
                border: 1px solid var(--color-accent);
                border-radius: 6px;
                padding: 2px 8px;
                flex: 1;
                outline: none;
            }

            /* ── Toast ──────────────────────────────── */
            .toast {
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%) translateY(20px);
                background: var(--color-surface-raised);
                color: var(--color-text);
                border: 1px solid var(--color-border-emphasis);
                border-radius: 10px;
                padding: 10px 18px;
                font-size: var(--text-sm);
                font-family: var(--font-sans);
                z-index: 200;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s, transform 0.2s var(--ease-spring);
                box-shadow: var(--shadow-md);
            }
            .toast.visible {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
                pointer-events: auto;
            }

            /* ── Edit hint ─────────────────────────── */
            .todo-row:not(.completed):hover .todo-text {
                cursor: text;
            }

            /* ── Delete button ─────────────────────── */
            .delete-btn {
                flex-shrink: 0;
                background: none;
                border: none;
                font-size: 14px;
                cursor: pointer;
                color: var(--color-text-disabled);
                padding: 0 2px;
                line-height: 1;
                opacity: 0;
                transition: color var(--duration-fast), opacity var(--duration-fast);
            }
            .todo-row:hover .delete-btn { opacity: 1; }
            .delete-btn:hover { color: var(--color-danger); }
            @media (hover: none) { .delete-btn { display: none; } }

            /* ── Snooze Button ──────────────────────── */
            .snooze-btn {
                flex-shrink: 0;
                background: none;
                border: none;
                font-size: 14px;
                cursor: pointer;
                color: var(--color-text-disabled);
                padding: 0 2px;
                line-height: 1;
                opacity: 0;
                transition: color var(--duration-fast), opacity var(--duration-fast);
            }
            .todo-row:hover .snooze-btn { opacity: 1; }
            .snooze-btn:hover { color: var(--color-secondary); }

            /* ── Snooze Menu ────────────────────────── */
            .snooze-menu {
                position: fixed;
                z-index: 100;
                background: var(--color-surface);
                border: 1px solid var(--color-border-emphasis);
                border-radius: 10px;
                padding: 4px 0;
                min-width: 150px;
                box-shadow: var(--shadow-md);
            }
            .snooze-menu-item {
                padding: 8px 14px;
                font-size: var(--text-sm);
                color: var(--color-text);
                cursor: pointer;
                transition: background var(--duration-fast);
            }
            .snooze-menu-item:hover { background: var(--color-surface-hover); }
            .snooze-menu-item:first-child { border-radius: 10px 10px 0 0; }
            .snooze-menu-item:last-child { border-radius: 0 0 10px 10px; }

            /* ── Snoozed section (like completed) ──── */
            .snoozed-toggle {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 0;
                cursor: pointer;
                user-select: none;
                -webkit-tap-highlight-color: transparent;
            }
            .snoozed-toggle:hover .toggle-label { color: var(--color-text); }
            .snoozed-list {
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.35s var(--ease-out);
            }
            .snoozed-list.open { max-height: 3000px; }
            .snoozed-row .todo-row { opacity: 0.55; }
            .snoozed-row .todo-row:hover { opacity: 0.85; }
            .snooze-wake-label {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-secondary);
                margin-left: auto;
                white-space: nowrap;
            }

            /* ── Focus Mode ─────────────────────────── */
            .focus-mode .todo-list { padding-top: var(--space-sm); }

            /* ── Theme Toggle ───────────────────────── */
            .theme-toggle {
                width: 32px;
                height: 32px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 8px;
                color: var(--color-text-secondary);
                cursor: pointer;
                transition: all var(--duration-fast) var(--ease-out);
                font-size: 15px;
            }
            .theme-toggle:hover { color: var(--color-text); border-color: var(--color-border-emphasis); }
            .theme-toggle:active { transform: scale(0.92); }

            /* Light mode: soften grid overlay + noise */
            :root.light body::before { opacity: 0.4; background: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px); background-size: 60px 60px; mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent); }
            :root.light html::after { opacity: 0.01; }
            :root.light .todo-row.completed { opacity: 0.6; }

            @media (prefers-reduced-motion: reduce) {
                *, *::before, *::after {
                    animation-duration: 0.01ms !important;
                    transition-duration: 0.01ms !important;
                }
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="accent-bar"></div>
            <div class="header-inner">
                <div class="header-left">
                    <h1>To-Do</h1>
                    <div class="header-date" id="header-date"></div>
                </div>
                <div class="header-right">
                    <span class="sync-status" id="sync-status"></span>
                    <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">
                        <span id="theme-icon">☀</span>
                    </button>
                    <button class="refresh-btn" id="refresh-btn" title="Refresh">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2.5 8a5.5 5.5 0 0 1 9.3-4"/><path d="M13.5 8a5.5 5.5 0 0 1-9.3 4"/><path d="M11.5 1.5v3h3"/><path d="M4.5 14.5v-3h-3"/></svg>
                    </button>
                </div>
            </div>
        </header>
        <div id="app">
            <div class="skeleton-group">
                <div class="skeleton-heading"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
            </div>
            <div class="skeleton-group">
                <div class="skeleton-heading" style="width:100px"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var app = document.getElementById('app');
        var data = null;
        var filterMode = sessionStorage.getItem('todo-filter') || 'all';
        var completedExpanded = false;
        var searchQuery = sessionStorage.getItem('todo-search') || '';
        var refreshTimer = null;
        var refreshBtn = document.getElementById('refresh-btn');
        var searchDebounceTimer = null;

        // Show today's date in header
        var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var now = new Date();
        document.getElementById('header-date').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();

        refreshBtn.addEventListener('click', function() {
            refreshBtn.classList.add('spinning');
            needsFreshFetch = true;
            load();
        });

        // Theme toggle
        var themeToggle = document.getElementById('theme-toggle');
        var themeIcon = document.getElementById('theme-icon');
        function updateThemeIcon() {
            var isLight = document.documentElement.classList.contains('light');
            themeIcon.textContent = isLight ? '\u263E' : '\u2600'; // ☾ moon when light (click=go dark), ☀ sun when dark (click=go light)
        }
        updateThemeIcon();
        themeToggle.addEventListener('click', function() {
            document.documentElement.classList.toggle('light');
            var isLight = document.documentElement.classList.contains('light');
            localStorage.setItem('todo-theme', isLight ? 'light' : 'dark');
            document.getElementById('meta-theme-color').content = isLight ? '#f2f2f4' : '#1a1f2e';
            updateThemeIcon();
        });

        var needsFreshFetch = false;
        function load() {
            var url = '/api/todos';
            var opts = {};
            if (needsFreshFetch) {
                url += '?_t=' + Date.now();
                opts.cache = 'no-store';
                needsFreshFetch = false;
            }
            fetch(url, opts)
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.error) throw new Error(d.error);
                    data = d;
                    refreshBtn.classList.remove('spinning');
                    updateSyncStatus();
                    render();
                    scheduleRefresh();
                })
                .catch(function(e) {
                    refreshBtn.classList.remove('spinning');
                    var el = document.getElementById('sync-status');
                    el.textContent = 'Error';
                    el.className = 'sync-status error';
                    if (data) {
                        // Keep existing data visible, show toast
                        showToast('Sync failed — showing cached data');
                    } else {
                        // First load failed, show error state
                        app.textContent = '';
                        var msg = document.createElement('div');
                        msg.className = 'state-msg';
                        var h = document.createElement('h3');
                        h.textContent = 'Failed to load';
                        var p = document.createElement('p');
                        p.textContent = e.message;
                        msg.appendChild(h);
                        msg.appendChild(p);
                        app.appendChild(msg);
                    }
                    scheduleRefresh();
                });
        }

        function scheduleRefresh() {
            if (refreshTimer) clearTimeout(refreshTimer);
            refreshTimer = setTimeout(function() {
                if (!document.hidden) load();
                else scheduleRefresh();
            }, 120000);
        }

        function updateSyncStatus() {
            var el = document.getElementById('sync-status');
            if (!data || !data.lastSynced) { el.textContent = 'Not synced'; el.className = 'sync-status error'; return; }
            var ago = Math.round((Date.now() - new Date(data.lastSynced).getTime()) / 60000);
            if (ago < 1) el.textContent = 'Just now';
            else if (ago < 60) el.textContent = ago + 'm ago';
            else el.textContent = Math.round(ago / 60) + 'h ago';
            el.className = 'sync-status' + (ago > 5 ? ' stale' : '');
        }

        function getTodayStr() {
            var d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }
        function getWeekRange() {
            var today = new Date(), day = today.getDay();
            var monday = new Date(today); monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
            var sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
            return { start: fmtDate(monday), end: fmtDate(sunday) };
        }
        function fmtDate(d) {
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }
        function extractDate(heading) {
            var m = heading.match(/(\d{4}-\d{2}-\d{2})/);
            return m ? m[1] : null;
        }

        // Toast notifications
        var toastEl = null;
        var toastTimer = null;
        function showToast(msg) {
            if (toastEl) toastEl.remove();
            toastEl = document.createElement('div');
            toastEl.className = 'toast';
            toastEl.textContent = msg;
            document.body.appendChild(toastEl);
            requestAnimationFrame(function() { toastEl.classList.add('visible'); });
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(function() {
                if (toastEl) { toastEl.classList.remove('visible'); setTimeout(function() { if (toastEl) { toastEl.remove(); toastEl = null; } }, 200); }
            }, 3000);
        }

        // Human-readable heading display
        var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        function humanHeading(heading) {
            var m = heading.match(/^(\d{4}-\d{2}-\d{2})\s*(.*)/);
            if (!m) return heading;
            var iso = m[1], rest = m[2];
            var todayStr = getTodayStr();
            var yesterdayDate = new Date(); yesterdayDate.setDate(yesterdayDate.getDate() - 1);
            var yesterdayStr = fmtDate(yesterdayDate);
            var label;
            if (iso === todayStr) label = 'Today';
            else if (iso === yesterdayStr) label = 'Yesterday';
            else {
                var parts = iso.split('-');
                var d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
                label = dayNames[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
            }
            return rest ? label + ' · ' + rest : label;
        }

        function filterTodos() {
            var todayStr = getTodayStr();
            var source = data.todos;
            if (filterMode === 'today') source = source.filter(function(t) { return t.heading.indexOf(todayStr) !== -1 || t.heading === 'Quick Tasks'; });
            else if (filterMode === 'week') {
                var range = getWeekRange();
                source = source.filter(function(t) { var d = extractDate(t.heading); return (d && d >= range.start && d <= range.end) || t.heading === 'Quick Tasks'; });
            }
            // Focus mode: only pinned tasks
            if (filterMode === 'focus') {
                source = source.filter(function(t) { return isPinned(t.id); });
            }
            if (searchQuery) {
                var q = searchQuery;
                source = source.filter(function(t) { return t.text.toLowerCase().indexOf(q) !== -1 || t.heading.toLowerCase().indexOf(q) !== -1; });
            }
            var active = [], completed = [], snoozed = [];
            var archiveCutoff = Date.now() - 24 * 3600000;
            for (var i = 0; i < source.length; i++) {
                var t = source[i];
                if (!t.checked) {
                    if (isSnoozed(t.id)) snoozed.push(t);
                    else active.push(t);
                } else {
                    // Show completed task if it was completed recently (within 24h)
                    var ct = completedAt[t.id];
                    var showCompleted = false;
                    if (ct && ct > archiveCutoff) {
                        // Completed within the last 24 hours — always show
                        showCompleted = true;
                    } else {
                        // Fallback: show if heading is today or dateless
                        var d = extractDate(t.heading);
                        if (d === todayStr) showCompleted = true;
                        else if (!d || t.heading === 'Quick Tasks') showCompleted = !ct; // legacy tasks without timestamp
                    }
                    if (showCompleted) completed.push(t);
                }
            }
            return { active: active, completed: completed, snoozed: snoozed };
        }

        function groupByHeading(todos) {
            var groups = [], map = {};
            for (var i = 0; i < todos.length; i++) {
                var t = todos[i];
                if (!map[t.heading]) { map[t.heading] = []; groups.push({ heading: t.heading, items: map[t.heading] }); }
                map[t.heading].push(t);
            }
            return groups;
        }

        var addingTask = false;
        var undoStack = []; // { type: 'toggle'|'add', todo, prevChecked }
        var flatMode = false;

        // Custom order & dividers (flat mode only, persisted in localStorage)
        var customOrder = JSON.parse(localStorage.getItem('todo-custom-order') || '[]'); // array of IDs (task or divider)
        var dividers = JSON.parse(localStorage.getItem('todo-dividers') || '{}'); // { id: label }

        function saveOrder() { localStorage.setItem('todo-custom-order', JSON.stringify(customOrder)); }
        function saveDividers() { localStorage.setItem('todo-dividers', JSON.stringify(dividers)); }

        function applyCustomOrder(tasks) {
            if (customOrder.length === 0) return tasks;
            var byId = {};
            for (var i = 0; i < tasks.length; i++) byId[tasks[i].id] = tasks[i];
            var ordered = [];
            // Add items in saved order (tasks + dividers)
            for (var j = 0; j < customOrder.length; j++) {
                var oid = customOrder[j];
                if (byId[oid]) { ordered.push(byId[oid]); delete byId[oid]; }
                else if (dividers[oid]) { ordered.push({ id: oid, text: dividers[oid], _divider: true }); }
            }
            // Append any new tasks not in saved order (at the top)
            var unsorted = [];
            for (var k in byId) unsorted.push(byId[k]);
            return unsorted.concat(ordered);
        }

        function rebuildOrder(tasks) {
            // Rebuild customOrder from current flat list (tasks + dividers interleaved)
            customOrder = [];
            for (var i = 0; i < tasks.length; i++) customOrder.push(tasks[i].id);
            saveOrder();
        }

        function addDivider() {
            var did = 'div-' + Date.now();
            dividers[did] = '── ── ──';
            saveDividers();
            customOrder.push(did);
            saveOrder();
            render();
        }

        function removeDivider(did) {
            delete dividers[did];
            saveDividers();
            customOrder = customOrder.filter(function(x) { return x !== did; });
            saveOrder();
            render();
        }

        // Pinned / starred tasks (persisted in localStorage)
        var pinnedIds = JSON.parse(localStorage.getItem('todo-pinned') || '[]');
        function savePinned() { localStorage.setItem('todo-pinned', JSON.stringify(pinnedIds)); }
        function togglePin(todoId) {
            var idx = pinnedIds.indexOf(todoId);
            if (idx === -1) pinnedIds.push(todoId);
            else pinnedIds.splice(idx, 1);
            savePinned();
            render();
        }
        function isPinned(todoId) { return pinnedIds.indexOf(todoId) !== -1; }

        // Snoozed tasks (persisted in localStorage)
        var snoozedMap = JSON.parse(localStorage.getItem('todo-snoozed') || '{}'); // { taskId: wakeAtTimestamp }
        var snoozedExpanded = false;
        function saveSnoozed() { localStorage.setItem('todo-snoozed', JSON.stringify(snoozedMap)); }
        function isSnoozed(todoId) { return snoozedMap[todoId] && snoozedMap[todoId] > Date.now(); }
        function snoozeTodo(todoId, ms) {
            snoozedMap[todoId] = Date.now() + ms;
            saveSnoozed();
            showToast('Snoozed' + (ms < 86400000 ? ' until later today' : ms < 172800000 ? ' until tomorrow' : ' until next week'));
            render();
        }
        function unsnoozeTodo(todoId) {
            delete snoozedMap[todoId];
            saveSnoozed();
            render();
        }
        // Clean up expired snoozes on load
        (function() {
            var now = Date.now(), changed = false;
            for (var k in snoozedMap) { if (snoozedMap[k] <= now) { delete snoozedMap[k]; changed = true; } }
            if (changed) saveSnoozed();
        })();
        function showSnoozeMenu(e, todoId) {
            e.preventDefault();
            e.stopPropagation();
            closeSnoozeMenu();
            var menu = document.createElement('div');
            menu.className = 'snooze-menu';
            menu.id = 'snooze-menu';
            menu.style.left = Math.min(e.clientX, window.innerWidth - 160) + 'px';
            menu.style.top = Math.min(e.clientY, window.innerHeight - 140) + 'px';
            var options = [
                ['Later today', 4 * 3600000],
                ['Tomorrow morning', calcTomorrowMs()],
                ['Next week', calcNextWeekMs()]
            ];
            for (var i = 0; i < options.length; i++) {
                var item = document.createElement('div');
                item.className = 'snooze-menu-item';
                item.textContent = options[i][0];
                item.addEventListener('click', (function(ms) { return function(ev) { ev.stopPropagation(); closeSnoozeMenu(); snoozeTodo(todoId, ms); }; })(options[i][1]));
                menu.appendChild(item);
            }
            document.body.appendChild(menu);
            setTimeout(function() { document.addEventListener('click', closeSnoozeMenu, { once: true }); }, 0);
        }
        function closeSnoozeMenu() { var m = document.getElementById('snooze-menu'); if (m) m.remove(); }
        function calcTomorrowMs() {
            var t = new Date();
            t.setDate(t.getDate() + 1);
            t.setHours(8, 0, 0, 0);
            return t.getTime() - Date.now();
        }
        function calcNextWeekMs() {
            var t = new Date();
            var day = t.getDay();
            var daysUntilMon = day === 0 ? 1 : 8 - day;
            t.setDate(t.getDate() + daysUntilMon);
            t.setHours(8, 0, 0, 0);
            return t.getTime() - Date.now();
        }
        function formatWakeTime(ts) {
            var d = new Date(ts);
            var now = new Date();
            var tom = new Date(); tom.setDate(tom.getDate() + 1);
            if (d.toDateString() === now.toDateString()) return 'today ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
            if (d.toDateString() === tom.toDateString()) return 'tomorrow';
            return dayNames[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
        }

        // Completion timestamps for auto-archive
        var completedAt = JSON.parse(localStorage.getItem('todo-completed-at') || '{}'); // { taskId: timestamp }
        function saveCompletedAt() { localStorage.setItem('todo-completed-at', JSON.stringify(completedAt)); }

        // Dynamic favicon dot
        function updateFavicon(active, total) {
            var canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            var ctx = canvas.getContext('2d');
            // Draw a rounded square background
            var isLight = document.documentElement.classList.contains('light');
            ctx.fillStyle = isLight ? '#f2f2f4' : '#1a1f2e';
            ctx.beginPath();
            ctx.roundRect(0, 0, 32, 32, 6);
            ctx.fill();
            // Draw a "T" letter
            ctx.fillStyle = isLight ? '#2a2d3a' : '#e0e0e0';
            ctx.font = 'bold 20px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('T', 16, 17);
            // Draw status dot if there are tasks

                ctx.beginPath();

                ctx.fillStyle = active === 0 ? '#22c55e' : '#ef4444';
                ctx.fill();
            }
            var link = document.querySelector('link[rel="icon"]');

        function undoLast() {
            if (undoStack.length === 0) return;

                fetch('/api/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: action.todo.id, checked: action.prevChecked })
                });
            } else if (action.type === 'delete') {
                // Re-add the deleted todo locally
                if (data && data.todos) {
                    var insertIdx = Math.min(action.index, data.todos.length);
                    data.todos.splice(insertIdx, 0, action.todo);
                }
                render();
                showToast('Restored: ' + (action.todo.text.length > 30 ? action.todo.text.slice(0, 30) + '\u2026' : action.todo.text));
                // Re-create in Notion via add endpoint (old block was archived)
                fetch('/api/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: action.todo.text })
                }).then(function(r) { return r.json(); }).then(function(d) {
                    if (d.todo && data && data.todos) {

                    scheduleRefresh();

        // Shake-to-undo (mobile)
        (function() {
            var shakeThreshold = 15;
            var shakeCount = 0;
            var lastShake = 0;
            var shakeCooldown = false;

            function onMotion(e) {
                var acc = e.accelerationIncludingGravity;
                if (!acc) return;
                var force = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z) - 9.8;
                if (force > shakeThreshold) {
                    var now = Date.now();
                    if (now - lastShake > 300) shakeCount = 0;
                    shakeCount++;
                    lastShake = now;
                    if (shakeCount >= 3 && !shakeCooldown) {
                        shakeCooldown = true;
                        undoLast();
                        setTimeout(function() { shakeCooldown = false; }, 1500);
                    }
                }
            }

            function enableShake() {
                window.addEventListener('devicemotion', onMotion, { passive: true });
            }

            // iOS 13+ requires permission
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                document.addEventListener('touchstart', function iosMotionPermission() {
                    DeviceMotionEvent.requestPermission().then(function(state) {
                        if (state === 'granted') enableShake();
                    }).catch(function() {});
                    document.removeEventListener('touchstart', iosMotionPermission);
                }, { once: true });
            } else if (typeof DeviceMotionEvent !== 'undefined') {
                enableShake();
            }
        })();

        function getDropTarget(el) {
            // Walk up to find element with data-id (handles wrapper or direct row)
            while (el && !el.getAttribute('data-id')) el = el.parentElement;
            return el;
        }
        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            var row = e.currentTarget;
            clearDropIndicators();
            var rect = row.getBoundingClientRect();
            var mid = rect.top + rect.height / 2;
            if (e.clientY < mid) row.classList.add('drag-over-above');
            else row.classList.add('drag-over-below');
        }
        function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over-above', 'drag-over-below'); }
        function handleDrop(e) {
            e.preventDefault();
            var targetRow = e.currentTarget;
            var targetId = targetRow.getAttribute('data-id');
            if (!targetId) { var found = getDropTarget(targetRow); if (found) targetId = found.getAttribute('data-id'); }
            if (!dragId || dragId === targetId) { clearDropIndicators(); return; }
            // Determine position
            var rect = targetRow.getBoundingClientRect();
            var above = e.clientY < rect.top + rect.height / 2;
            // Move in customOrder
            customOrder = customOrder.filter(function(x) { return x !== dragId; });
            var targetIdx = customOrder.indexOf(targetId);
            if (targetIdx === -1) targetIdx = customOrder.length;
            if (!above) targetIdx++;
            customOrder.splice(targetIdx, 0, dragId);
            saveOrder();
            clearDropIndicators();
            render();
        }
        function clearDropIndicators() {
            var rows = document.querySelectorAll('.drag-over-above, .drag-over-below');
            for (var i = 0; i < rows.length; i++) rows[i].classList.remove('drag-over-above', 'drag-over-below');
        }

            var result = filterTodos();
            var active = result.active, completed = result.completed, snoozedTasks = result.snoozed;

            // Separate pinned tasks to top
            var pinned = [], unpinned = [];
            for (var pi = 0; pi < active.length; pi++) {

            fg.className = 'filter-group';

                if (flatMode) {
                    // Initialize order from current active list if needed
                    var result2 = filterTodos();
                    var ids = result2.active.map(function(t) { return t.id; });
                    // Only rebuild if customOrder is empty or missing items
                    if (customOrder.length === 0) { customOrder = ids; saveOrder(); }
                }
                render();
            });
            tb.appendChild(flatBtn);

            tb.appendChild(fg);

            // Inline search (debounced)
            var sb = document.createElement('div');
            sb.className = 'search-inline';
            var si = document.createElement('span');
            si.className = 'search-icon';
            si.textContent = '\u2315';
            sb.appendChild(si);
            var input = document.createElement('input');
            input.type = 'text';
            input.className = 'search-input';
            input.placeholder = 'Search...';
            input.value = searchQuery;
            input.addEventListener('input', function() {
                var val = this.value.toLowerCase();
                if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(function() {
                    searchQuery = val;
                    sessionStorage.setItem('todo-search', searchQuery);
                    render();
                }, 150);
            });
            sb.appendChild(input);
            tb.appendChild(sb);

            frag.appendChild(tb);

            // Add task
            var atb = document.createElement('div');
            atb.className = 'add-task-bar';
            var ati = document.createElement('input');
            ati.type = 'text';
            ati.className = 'add-task-input';
            ati.placeholder = 'Add a quick task...';
            ati.id = 'add-task-input';
            var atBtn = document.createElement('button');
            atBtn.className = 'add-task-btn';
            atBtn.textContent = 'Add';
            atBtn.disabled = addingTask;
            function submitTask() {
                var v = ati.value.trim();
                if (v) { addTask(v); }
            }
            atBtn.addEventListener('click', submitTask);
            ati.addEventListener('keydown', function(e) { if (e.key === 'Enter') submitTask(); });
            atb.appendChild(ati);
            atb.appendChild(atBtn);
            frag.appendChild(atb);

            // List
            var list = document.createElement('div');
            list.className = 'todo-list' + (flatMode ? ' flat-mode' : '');
            if (active.length === 0 && completed.length === 0 && snoozedTasks.length === 0) {
                var empty = document.createElement('div');
                empty.className = 'state-msg';
                var eh = document.createElement('h3');
                eh.textContent = searchQuery ? 'No matches' : filterMode === 'focus' ? 'No pinned tasks' : filterMode === 'today' ? 'No tasks for today' : filterMode === 'week' ? 'No tasks this week' : 'All clear';
                var ep = document.createElement('p');
                ep.textContent = searchQuery ? 'Try a different search.' : filterMode === 'focus' ? 'Star a task to pin it here.' : 'Nothing to do right now.';
                empty.appendChild(eh);
                empty.appendChild(ep);
                list.appendChild(empty);
            } else {
                if (flatMode) {
                    var flatAll = pinned.concat(applyCustomOrder(unpinned));
                    // Don't rebuild order here — only on actual drops
                    for (var ai = 0; ai < flatAll.length; ai++) list.appendChild(makeRow(flatAll[ai]));
                    var addDiv = document.createElement('button');
                    addDiv.className = 'add-divider-btn';
                    addDiv.textContent = '+ Add divider';
                    addDiv.addEventListener('click', addDivider);
                    list.appendChild(addDiv);
                } else {
                // Show pinned tasks first
                if (pinned.length > 0) {
                    var pgh = document.createElement('div');
                    pgh.className = 'group-heading';
                    var pghT = document.createElement('h3');
                    pghT.textContent = '\u2605 Pinned';
                    pgh.appendChild(pghT);
                    var pghB = document.createElement('span');
                    pghB.className = 'badge';
                    pghB.textContent = pinned.length;
                    pgh.appendChild(pghB);
                    list.appendChild(pgh);
                    for (var pti = 0; pti < pinned.length; pti++) list.appendChild(makeRow(pinned[pti]));
                }
                var groups = groupByHeading(unpinned);
                for (var gi = 0; gi < groups.length; gi++) {
                    var g = groups[gi];
                    var gh = document.createElement('div');
                    gh.className = 'group-heading';
                    var ghT = document.createElement('h3');
                    ghT.textContent = humanHeading(g.heading);
                    gh.appendChild(ghT);
                    var ghB = document.createElement('span');
                    ghB.className = 'badge';
                    ghB.textContent = g.items.length;
                    gh.appendChild(ghB);
                    list.appendChild(gh);
                    for (var ti = 0; ti < g.items.length; ti++) list.appendChild(makeRow(g.items[ti]));
                }
                } // end grouped mode
                // Snoozed section
                if (snoozedTasks.length > 0 && filterMode !== 'focus') {
                    var snzDiv = document.createElement('div');
                    snzDiv.className = 'completed-divider';
                    list.appendChild(snzDiv);
                    var snzToggle = document.createElement('div');
                    snzToggle.className = 'snoozed-toggle';
                    snzToggle.addEventListener('click', function() { snoozedExpanded = !snoozedExpanded; render(); });
                    var snzArrow = document.createElement('span');
                    snzArrow.className = 'toggle-arrow' + (snoozedExpanded ? ' open' : '');
                    snzArrow.textContent = '\u25b8';
                    snzToggle.appendChild(snzArrow);
                    var snzLabel = document.createElement('span');
                    snzLabel.className = 'toggle-label';
                    snzLabel.textContent = 'Snoozed';
                    snzToggle.appendChild(snzLabel);
                    var snzBadge = document.createElement('span');
                    snzBadge.className = 'toggle-badge';
                    snzBadge.style.background = 'oklch(0.72 0.18 320 / 0.12)';
                    snzBadge.style.color = 'var(--color-secondary)';
                    snzBadge.textContent = snoozedTasks.length;
                    snzToggle.appendChild(snzBadge);
                    list.appendChild(snzToggle);
                    var snzList = document.createElement('div');
                    snzList.className = 'snoozed-list' + (snoozedExpanded ? ' open' : '');
                    for (var si3 = 0; si3 < snoozedTasks.length; si3++) {
                        var snzWrap = document.createElement('div');
                        snzWrap.className = 'snoozed-row';
                        var snzRow = makeRow(snoozedTasks[si3]);
                        snzWrap.appendChild(snzRow);
                        // Add wake time label + unsnooze button
                        var wakeLabel = document.createElement('div');
                        wakeLabel.style.display = 'flex';
                        wakeLabel.style.justifyContent = 'flex-end';
                        wakeLabel.style.padding = '0 16px 4px';
                        wakeLabel.style.gap = '8px';
                        wakeLabel.style.alignItems = 'center';
                        var wt = document.createElement('span');
                        wt.className = 'snooze-wake-label';
                        wt.textContent = '\u23F0 ' + formatWakeTime(snoozedMap[snoozedTasks[si3].id]);
                        wakeLabel.appendChild(wt);
                        var unsnz = document.createElement('button');
                        unsnz.className = 'snooze-btn';
                        unsnz.style.opacity = '1';
                        unsnz.style.fontSize = 'var(--text-xs)';
                        unsnz.style.color = 'var(--color-secondary)';
                        unsnz.textContent = 'Wake';
                        unsnz.addEventListener('click', (function(tid) { return function(ev) { ev.stopPropagation(); unsnoozeTodo(tid); }; })(snoozedTasks[si3].id));
                        wakeLabel.appendChild(unsnz);
                        snzWrap.appendChild(wakeLabel);
                        snzList.appendChild(snzWrap);
                    }
                    list.appendChild(snzList);
                }
                if (completed.length > 0 && filterMode !== 'focus') {
                    var div = document.createElement('div');
                    div.className = 'completed-divider';
                    list.appendChild(div);
                    var toggle = document.createElement('div');
                    toggle.className = 'completed-toggle';
                    toggle.addEventListener('click', function() { completedExpanded = !completedExpanded; render(); });
                    var arrow = document.createElement('span');
                    arrow.className = 'toggle-arrow' + (completedExpanded ? ' open' : '');
                    arrow.textContent = '\u25b8';
                    toggle.appendChild(arrow);
                    var tl = document.createElement('span');
                    tl.className = 'toggle-label';
                    tl.textContent = 'Completed';
                    toggle.appendChild(tl);
                    var tbd = document.createElement('span');
                    tbd.className = 'toggle-badge';
                    tbd.textContent = completed.length;
                    toggle.appendChild(tbd);
                    list.appendChild(toggle);
                    var cl = document.createElement('div');
                    cl.className = 'completed-list' + (completedExpanded ? ' open' : '');
                    for (var ci = 0; ci < completed.length; ci++) cl.appendChild(makeRow(completed[ci]));
                    list.appendChild(cl);
                }
            }
            frag.appendChild(list);

            // Footer
            var footer = document.createElement('div');
            footer.className = 'footer';
            var fc = document.createElement('span');
            fc.className = 'footer-count';
            fc.textContent = active.length + ' active' + (snoozedTasks.length ? ' \u00b7 ' + snoozedTasks.length + ' snoozed' : '') + ' \u00b7 ' + completed.length + ' done';
            footer.appendChild(fc);
            var fn = document.createElement('span');
            fn.className = 'footer-note';
            fn.textContent = '\u2318Z undo \u00b7 N add \u00b7 / search \u00b7 R refresh \u00b7 1-4 filter \u00b7 L theme';
            footer.appendChild(fn);
            frag.appendChild(footer);

            while (app.firstChild) app.removeChild(app.firstChild);
            app.appendChild(frag);

            // Re-focus search if it was active
            if (searchQuery) {
                var si2 = app.querySelector('.search-input');
                if (si2) { si2.focus(); si2.setSelectionRange(si2.value.length, si2.value.length); }
            }

            // Update tab title and favicon
            updateTitle(active.length);
            updateFavicon(active.length, active.length + completed.length);
        }

        load();

        // PWA shortcut: auto-focus add input when opened via ?action=add
        if (new URLSearchParams(window.location.search).get('action') === 'add') {
            var checkAdd = setInterval(function() {
                var ai2 = document.getElementById('add-task-input');
                if (ai2) { ai2.focus(); clearInterval(checkAdd); }
            }, 100);
            setTimeout(function() { clearInterval(checkAdd); }, 3000);
            // Clean URL without reload
            history.replaceState(null, '', '/');
        }

        // Register service worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function() {});
        }

    })();
    </script>
</body>
</html>
