<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1f2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>To-Do</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        @layer reset, tokens, base, components;

        @layer reset {
            *, *::before, *::after { box-sizing: border-box; margin: 0; }
            body { line-height: 1.5; -webkit-font-smoothing: antialiased; }
            button { font: inherit; }
        }

        @layer tokens {
            :root {
                --color-bg: oklch(0.14 0.025 250);
                --color-surface: oklch(0.18 0.025 250);
                --color-surface-hover: oklch(0.22 0.025 250);
                --color-surface-raised: oklch(0.26 0.025 250);
                --color-surface-overlay: oklch(0.30 0.025 250);
                --color-text: oklch(0.93 0.01 250);
                --color-text-secondary: oklch(0.75 0.01 250);
                --color-text-muted: oklch(0.55 0.015 250);
                --color-text-disabled: oklch(0.40 0.01 250);
                --color-border: oklch(1 0 0 / 0.08);
                --color-border-emphasis: oklch(1 0 0 / 0.15);
                --color-border-strong: oklch(1 0 0 / 0.25);
                --color-accent: oklch(0.72 0.19 155);
                --color-secondary: oklch(0.69 0.18 255);
                --accent-muted: oklch(0.72 0.19 155 / 0.15);
                --accent-subtle: oklch(0.72 0.19 155 / 0.08);
                --color-success: oklch(0.72 0.17 145);
                --color-warning: oklch(0.80 0.16 85);
                --color-danger: oklch(0.70 0.19 25);
                --color-heading: oklch(0.78 0.15 160);
                --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
                --text-xs: clamp(0.6875rem, 0.625rem + 0.25vw, 0.8125rem);
                --text-sm: clamp(0.8125rem, 0.75rem + 0.25vw, 0.9375rem);
                --text-base: clamp(0.9375rem, 0.875rem + 0.25vw, 1.0625rem);
                --text-lg: clamp(1.125rem, 1rem + 0.5vw, 1.375rem);
                --text-xl: clamp(1.375rem, 1.125rem + 1vw, 1.875rem);
                --space-xs: clamp(0.25rem, 0.2rem + 0.2vw, 0.5rem);
                --space-sm: clamp(0.5rem, 0.4rem + 0.4vw, 0.875rem);
                --space-md: clamp(1rem, 0.875rem + 0.5vw, 1.5rem);
                --space-lg: clamp(1.5rem, 1.25rem + 1vw, 2.5rem);
                --ease-out: cubic-bezier(0, 0, 0.2, 1);
                --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
                --duration-fast: 150ms;
                --duration-normal: 250ms;
                --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.3);
                --shadow-md: 0 4px 12px oklch(0 0 0 / 0.4);
            }
        }

        @layer base {
            body {
                font-family: var(--font-sans);
                background-color: var(--color-bg);
                color: var(--color-text);
                line-height: 1.6;
                min-height: 100vh;
                min-height: 100dvh;
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
            body::before {
                content: '';
                position: fixed;
                inset: 0;
                pointer-events: none;
                background: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
                background-size: 60px 60px;
                mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
            }
            html::after {
                content: '';
                position: fixed;
                inset: 0;
                opacity: 0.018;
                mix-blend-mode: overlay;
                pointer-events: none;
                z-index: 9999;
                background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E") repeat;
                background-size: 256px 256px;
            }
        }

        @layer components {
            .container {
                position: relative;
                z-index: 1;
                max-width: 640px;
                margin: 0 auto;
                padding: 0 var(--space-md) 40px;
            }

            /* ── Header ──────────────────────────────── */
            header {
                position: sticky;
                top: 0;
                z-index: 10;
                background: oklch(0.14 0.025 250 / 0.85);
                backdrop-filter: blur(24px) saturate(1.2);
                -webkit-backdrop-filter: blur(24px) saturate(1.2);
                border-bottom: 1px solid var(--color-border);
                margin: 0 calc(var(--space-md) * -1);
                padding: 0 var(--space-md);
            }
            .accent-bar {
                height: 2px;
                background: linear-gradient(90deg, var(--color-accent), var(--color-secondary));
            }
            .header-inner {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 14px 0;
            }
            .header-left h1 {
                font-size: var(--text-lg);
                font-weight: 700;
                letter-spacing: -0.03em;
            }
            .header-date {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-text-muted);
                margin-top: 1px;
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .sync-status {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-text-secondary);
            }
            .sync-status.stale { color: var(--color-warning); }
            .sync-status.error { color: var(--color-danger); }
            .refresh-btn {
                width: 32px;
                height: 32px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 8px;
                color: var(--color-text-secondary);
                cursor: pointer;
                transition: all var(--duration-fast) var(--ease-out);
                font-size: 14px;
            }
            .refresh-btn:hover { color: var(--color-text); border-color: var(--color-border-emphasis); }
            .refresh-btn:active { transform: scale(0.92); }
            .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
            @keyframes spin { to { transform: rotate(360deg); } }

            /* ── Progress ────────────────────────────── */
            .progress-section { padding: var(--space-sm) 0 0; }
            .progress-header {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                margin-bottom: 6px;
            }
            .progress-label {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-text-secondary);
            }
            .progress-pct {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                font-weight: 600;
            }
            .progress-track {
                height: 5px;
                background: var(--color-surface-hover);
                border-radius: 3px;
                overflow: hidden;
            }
            .progress-fill {
                height: 100%;
                border-radius: 3px;
                transition: width 0.5s var(--ease-out), background 0.3s;
            }
            .progress-fill.low { background: var(--color-text-muted); }
            .progress-fill.mid { background: var(--color-secondary); }
            .progress-fill.high { background: var(--color-accent); }

            /* ── Toolbar ─────────────────────────────── */
            .toolbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: var(--space-sm) 0 4px;
                gap: 8px;
            }
            .filter-group {
                display: flex;
                gap: 2px;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 8px;
                padding: 3px;
            }
            .filter-btn {
                font-size: var(--text-xs);
                font-weight: 600;
                color: var(--color-text-muted);
                background: transparent;
                border: none;
                padding: 5px 12px;
                border-radius: 5px;
                cursor: pointer;
                transition: all var(--duration-fast) var(--ease-out);
            }
            .filter-btn:hover { color: var(--color-text-secondary); }
            .filter-btn.active {
                color: var(--color-text);
                background: var(--color-surface-hover);
                box-shadow: var(--shadow-sm);
            }
            .item-count {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-text-muted);
                white-space: nowrap;
            }

            /* ── Search ──────────────────────────────── */
            .search-bar {
                position: relative;
                margin-bottom: var(--space-xs);
            }
            .search-icon {
                position: absolute;
                left: 12px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--color-text-muted);
                font-size: 13px;
                pointer-events: none;
            }
            .search-input {
                width: 100%;
                padding: 8px 12px 8px 34px;
                font-family: var(--font-sans);
                font-size: var(--text-sm);
                color: var(--color-text);
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 10px;
                outline: none;
                transition: border-color var(--duration-fast) var(--ease-out);
            }
            .search-input::placeholder { color: var(--color-text-disabled); }
            .search-input:focus { border-color: var(--color-border-emphasis); }

            /* ── Todo List ───────────────────────────── */
            .todo-list { padding-top: 2px; }
            .group-heading {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: var(--space-md) 0 var(--space-xs);
            }
            .group-heading:first-child { padding-top: var(--space-sm); }
            .group-heading h3 {
                font-size: var(--text-sm);
                font-weight: 600;
                color: var(--color-heading);
                letter-spacing: -0.01em;
            }
            .group-heading .badge {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-text-muted);
                background: var(--color-surface);
                padding: 1px 7px;
                border-radius: 999px;
            }

            .todo-row {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                padding: 12px 16px;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 14px;
                margin-bottom: 4px;
                cursor: pointer;
                transition: all var(--duration-fast) var(--ease-out);
                -webkit-tap-highlight-color: transparent;
            }
            .todo-row:hover { background: var(--color-surface-hover); }
            .todo-row:active { transform: scale(0.99); }
            .todo-pip {
                width: 3px;
                min-height: 20px;
                align-self: stretch;
                background: var(--color-accent);
                border-radius: 2px;
                flex-shrink: 0;
            }
            .todo-check {
                width: 22px;
                height: 22px;
                flex-shrink: 0;
                border-radius: 6px;
                border: 2px solid var(--color-border-emphasis);
                background: var(--color-surface-hover);
                transition: all var(--duration-fast) var(--ease-spring);
                position: relative;
            }
            .todo-check.checked {
                background: var(--accent-muted);
                border-color: var(--color-accent);
                transform: scale(0.9);
            }
            .todo-check.checked::after {
                content: '';
                position: absolute;
                top: 3px;
                left: 6px;
                width: 5px;
                height: 10px;
                border: solid var(--color-accent);
                border-width: 0 2.5px 2.5px 0;
                transform: rotate(45deg);
            }
            .todo-text {
                font-size: var(--text-sm);
                line-height: 1.5;
                color: var(--color-text);
                flex: 1;
                padding-top: 1px;
            }
            .todo-row.completed .todo-text {
                color: var(--color-text-muted);
                text-decoration: line-through;
                text-decoration-color: var(--color-text-disabled);
            }
            .todo-row.completed .todo-pip { display: none; }
            .todo-row.completed {
                background: transparent;
                border-color: transparent;
                opacity: 0.7;
            }
            .todo-row.completed:hover { background: var(--color-surface); opacity: 1; }

            /* ── Completed Toggle ────────────────────── */
            .completed-divider {
                height: 1px;
                background: var(--color-border);
                margin: var(--space-md) 0 0;
            }
            .completed-toggle {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 0;
                cursor: pointer;
                user-select: none;
                -webkit-tap-highlight-color: transparent;
            }
            .completed-toggle:hover .toggle-label { color: var(--color-text); }
            .toggle-arrow {
                font-size: 11px;
                color: var(--color-text-secondary);
                transition: transform var(--duration-fast) var(--ease-out);
                display: inline-block;
            }
            .toggle-arrow.open { transform: rotate(90deg); }
            .toggle-label {
                font-size: var(--text-sm);
                font-weight: 600;
                color: var(--color-text-secondary);
                transition: color var(--duration-fast) var(--ease-out);
            }
            .toggle-badge {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-accent);
                background: var(--accent-subtle);
                padding: 2px 8px;
                border-radius: 999px;
            }
            .completed-list { display: none; }
            .completed-list.open { display: block; }

            /* ── Skeleton Loading ────────────────────── */
            .skeleton-group { padding-top: var(--space-md); }
            .skeleton-heading {
                width: 140px;
                height: 16px;
                background: var(--color-surface-hover);
                border-radius: 8px;
                margin-bottom: var(--space-sm);
            }
            .skeleton-row {
                height: 48px;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 14px;
                margin-bottom: 4px;
                overflow: hidden;
                position: relative;
            }
            .skeleton-row::after {
                content: '';
                position: absolute;
                inset: 0;
                background: linear-gradient(90deg, transparent 25%, var(--color-surface-hover) 50%, transparent 75%);
                background-size: 200% 100%;
                animation: shimmer 1.5s ease-in-out infinite;
            }
            @keyframes shimmer {
                0% { background-position: 200% 0; }
                100% { background-position: -200% 0; }
            }

            /* ── States ──────────────────────────────── */
            .state-msg {
                text-align: center;
                padding: 48px 0;
            }
            .state-msg h3 {
                font-size: var(--text-base);
                color: var(--color-text-secondary);
                font-weight: 500;
            }
            .state-msg p {
                font-size: var(--text-sm);
                color: var(--color-text-muted);
                margin-top: var(--space-xs);
            }

            /* ── Footer ──────────────────────────────── */
            .footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 12px 0;
                margin-top: var(--space-sm);
                border-top: 1px solid var(--color-border);
            }
            .footer-count {
                font-family: var(--font-mono);
                font-size: var(--text-xs);
                color: var(--color-text-secondary);
            }
            .footer-note {
                font-size: var(--text-xs);
                color: var(--color-text-muted);
            }

            /* ── Responsive ──────────────────────────── */
            @media (max-width: 480px) {
                .container { padding: 0 12px 32px; }
                header { margin: 0 -12px; padding: 0 12px; }
                .todo-row { padding: 12px; gap: 10px; }
                .todo-check { width: 24px; height: 24px; }
                .todo-check.checked::after { top: 4px; left: 7px; }
                .filter-btn { padding: 6px 10px; }
                .footer { flex-direction: column; gap: 4px; align-items: flex-start; }
            }
            @media (prefers-reduced-motion: reduce) {
                *, *::before, *::after {
                    animation-duration: 0.01ms !important;
                    transition-duration: 0.01ms !important;
                }
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="accent-bar"></div>
            <div class="header-inner">
                <div class="header-left">
                    <h1>To-Do</h1>
                    <div class="header-date" id="header-date"></div>
                </div>
                <div class="header-right">
                    <span class="sync-status" id="sync-status"></span>
                    <button class="refresh-btn" id="refresh-btn" title="Refresh">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2.5 8a5.5 5.5 0 0 1 9.3-4"/><path d="M13.5 8a5.5 5.5 0 0 1-9.3 4"/><path d="M11.5 1.5v3h3"/><path d="M4.5 14.5v-3h-3"/></svg>
                    </button>
                </div>
            </div>
        </header>
        <div id="app">
            <div class="progress-section">
                <div class="progress-track"><div class="progress-fill low" style="width:0"></div></div>
            </div>
            <div class="skeleton-group">
                <div class="skeleton-heading"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
            </div>
            <div class="skeleton-group">
                <div class="skeleton-heading" style="width:100px"></div>
                <div class="skeleton-row"></div>
                <div class="skeleton-row"></div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var app = document.getElementById('app');
        var data = null;
        var filterMode = 'all';
        var completedExpanded = false;
        var searchQuery = '';
        var refreshTimer = null;
        var refreshBtn = document.getElementById('refresh-btn');

        // Show today's date in header
        var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var now = new Date();
        document.getElementById('header-date').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();

        refreshBtn.addEventListener('click', function() {
            refreshBtn.classList.add('spinning');
            load();
        });

        function load() {
            fetch('/api/todos')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (d.error) throw new Error(d.error);
                    data = d;
                    refreshBtn.classList.remove('spinning');
                    updateSyncStatus();
                    render();
                    scheduleRefresh();
                })
                .catch(function(e) {
                    refreshBtn.classList.remove('spinning');
                    var el = document.getElementById('sync-status');
                    el.textContent = 'Error';
                    el.className = 'sync-status error';
                    app.textContent = '';
                    var msg = document.createElement('div');
                    msg.className = 'state-msg';
                    var h = document.createElement('h3');
                    h.textContent = 'Failed to load';
                    var p = document.createElement('p');
                    p.textContent = e.message;
                    msg.appendChild(h);
                    msg.appendChild(p);
                    app.appendChild(msg);
                    scheduleRefresh();
                });
        }

        function scheduleRefresh() {
            if (refreshTimer) clearTimeout(refreshTimer);
            refreshTimer = setTimeout(function() {
                if (!document.hidden) load();
                else scheduleRefresh();
            }, 120000);
        }

        function updateSyncStatus() {
            var el = document.getElementById('sync-status');
            if (!data || !data.lastSynced) { el.textContent = 'Not synced'; el.className = 'sync-status error'; return; }
            var ago = Math.round((Date.now() - new Date(data.lastSynced).getTime()) / 60000);
            if (ago < 1) el.textContent = 'Just now';
            else if (ago < 60) el.textContent = ago + 'm ago';
            else el.textContent = Math.round(ago / 60) + 'h ago';
            el.className = 'sync-status' + (ago > 5 ? ' stale' : '');
        }

        function getTodayStr() {
            var d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }
        function getWeekRange() {
            var today = new Date(), day = today.getDay();
            var monday = new Date(today); monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
            var sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
            return { start: fmtDate(monday), end: fmtDate(sunday) };
        }
        function fmtDate(d) {
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }
        function extractDate(heading) {
            var m = heading.match(/(\d{4}-\d{2}-\d{2})/);
            return m ? m[1] : null;
        }

        function filterTodos() {
            var todayStr = getTodayStr();
            var source = data.todos;
            if (filterMode === 'today') source = source.filter(function(t) { return t.heading.indexOf(todayStr) !== -1; });
            else if (filterMode === 'week') {
                var range = getWeekRange();
                source = source.filter(function(t) { var d = extractDate(t.heading); return d && d >= range.start && d <= range.end; });
            }
            if (searchQuery) {
                var q = searchQuery;
                source = source.filter(function(t) { return t.text.toLowerCase().indexOf(q) !== -1 || t.heading.toLowerCase().indexOf(q) !== -1; });
            }
            var active = [], completed = [];
            for (var i = 0; i < source.length; i++) {
                var t = source[i];
                if (!t.checked) active.push(t);
                else { var d = extractDate(t.heading); if (!d || d === todayStr) completed.push(t); }
            }
            return { active: active, completed: completed };
        }

        function todayProgress() {
            var todayStr = getTodayStr();
            var tt = data.todos.filter(function(t) { return t.heading.indexOf(todayStr) !== -1; });
            return { done: tt.filter(function(t) { return t.checked; }).length, total: tt.length };
        }

        function groupByHeading(todos) {
            var groups = [], map = {};
            for (var i = 0; i < todos.length; i++) {
                var t = todos[i];
                if (!map[t.heading]) { map[t.heading] = []; groups.push({ heading: t.heading, items: map[t.heading] }); }
                map[t.heading].push(t);
            }
            return groups;
        }

        function toggleTodo(todo) {
            var nc = !todo.checked;
            todo.checked = nc;
            render();
            fetch('/api/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: todo.id, checked: nc })
            }).then(function(r) { if (!r.ok) { todo.checked = !nc; render(); } })
              .catch(function() { todo.checked = !nc; render(); });
        }

        function makeRow(todo) {
            var row = document.createElement('div');
            row.className = 'todo-row' + (todo.checked ? ' completed' : '');
            row.addEventListener('click', function() { toggleTodo(todo); });
            if (!todo.checked) {
                var pip = document.createElement('div');
                pip.className = 'todo-pip';
                row.appendChild(pip);
            }
            var check = document.createElement('div');
            check.className = 'todo-check' + (todo.checked ? ' checked' : '');
            row.appendChild(check);
            var txt = document.createElement('span');
            txt.className = 'todo-text';
            txt.textContent = todo.text;
            row.appendChild(txt);
            return row;
        }

        function render() {
            if (!data) return;
            var result = filterTodos();
            var active = result.active, completed = result.completed;
            var progress = todayProgress();
            var pct = progress.total > 0 ? Math.round((progress.done / progress.total) * 100) : 0;
            var pctW = progress.total > 0 ? (progress.done / progress.total) * 100 : 0;
            var fillClass = pct >= 75 ? 'high' : pct >= 40 ? 'mid' : 'low';
            var frag = document.createDocumentFragment();

            // Progress
            var ps = document.createElement('div');
            ps.className = 'progress-section';
            var ph = document.createElement('div');
            ph.className = 'progress-header';
            var pl = document.createElement('span');
            pl.className = 'progress-label';
            pl.textContent = progress.total > 0 ? 'Today: ' + progress.done + '/' + progress.total : 'Today: no tasks';
            ph.appendChild(pl);
            if (progress.total > 0) {
                var pp = document.createElement('span');
                pp.className = 'progress-pct';
                pp.style.color = pct >= 75 ? 'var(--color-accent)' : pct >= 40 ? 'var(--color-secondary)' : 'var(--color-text-muted)';
                pp.textContent = pct + '%';
                ph.appendChild(pp);
            }
            ps.appendChild(ph);
            var track = document.createElement('div');
            track.className = 'progress-track';
            var fill = document.createElement('div');
            fill.className = 'progress-fill ' + fillClass;
            fill.style.width = pctW + '%';
            track.appendChild(fill);
            ps.appendChild(track);
            frag.appendChild(ps);

            // Toolbar
            var tb = document.createElement('div');
            tb.className = 'toolbar';
            var fg = document.createElement('div');
            fg.className = 'filter-group';
            var filters = [['All', 'all'], ['Today', 'today'], ['Week', 'week']];
            for (var fi = 0; fi < filters.length; fi++) {
                var btn = document.createElement('button');
                btn.className = 'filter-btn' + (filterMode === filters[fi][1] ? ' active' : '');
                btn.textContent = filters[fi][0];
                btn.setAttribute('data-mode', filters[fi][1]);
                btn.addEventListener('click', function() { filterMode = this.getAttribute('data-mode'); render(); });
                fg.appendChild(btn);
            }
            tb.appendChild(fg);
            var ic = document.createElement('span');
            ic.className = 'item-count';
            ic.textContent = active.length + ' active';
            tb.appendChild(ic);
            frag.appendChild(tb);

            // Search
            var sb = document.createElement('div');
            sb.className = 'search-bar';
            var si = document.createElement('span');
            si.className = 'search-icon';
            si.textContent = '\u2315';
            sb.appendChild(si);
            var input = document.createElement('input');
            input.type = 'text';
            input.className = 'search-input';
            input.placeholder = 'Search tasks...';
            input.value = searchQuery;
            input.addEventListener('input', function() { searchQuery = this.value.toLowerCase(); render(); });
            sb.appendChild(input);
            frag.appendChild(sb);

            // List
            var list = document.createElement('div');
            list.className = 'todo-list';
            if (active.length === 0 && completed.length === 0) {
                var empty = document.createElement('div');
                empty.className = 'state-msg';
                var eh = document.createElement('h3');
                eh.textContent = searchQuery ? 'No matches' : filterMode === 'today' ? 'No tasks for today' : filterMode === 'week' ? 'No tasks this week' : 'All clear';
                var ep = document.createElement('p');
                ep.textContent = searchQuery ? 'Try a different search.' : 'Nothing to do right now.';
                empty.appendChild(eh);
                empty.appendChild(ep);
                list.appendChild(empty);
            } else {
                var groups = groupByHeading(active);
                for (var gi = 0; gi < groups.length; gi++) {
                    var g = groups[gi];
                    var gh = document.createElement('div');
                    gh.className = 'group-heading';
                    var ghT = document.createElement('h3');
                    ghT.textContent = g.heading;
                    gh.appendChild(ghT);
                    var ghB = document.createElement('span');
                    ghB.className = 'badge';
                    ghB.textContent = g.items.length;
                    gh.appendChild(ghB);
                    list.appendChild(gh);
                    for (var ti = 0; ti < g.items.length; ti++) list.appendChild(makeRow(g.items[ti]));
                }
                if (completed.length > 0) {
                    var div = document.createElement('div');
                    div.className = 'completed-divider';
                    list.appendChild(div);
                    var toggle = document.createElement('div');
                    toggle.className = 'completed-toggle';
                    toggle.addEventListener('click', function() { completedExpanded = !completedExpanded; render(); });
                    var arrow = document.createElement('span');
                    arrow.className = 'toggle-arrow' + (completedExpanded ? ' open' : '');
                    arrow.textContent = '\u25b8';
                    toggle.appendChild(arrow);
                    var tl = document.createElement('span');
                    tl.className = 'toggle-label';
                    tl.textContent = 'Completed today';
                    toggle.appendChild(tl);
                    var tbd = document.createElement('span');
                    tbd.className = 'toggle-badge';
                    tbd.textContent = completed.length;
                    toggle.appendChild(tbd);
                    list.appendChild(toggle);
                    var cl = document.createElement('div');
                    cl.className = 'completed-list' + (completedExpanded ? ' open' : '');
                    for (var ci = 0; ci < completed.length; ci++) cl.appendChild(makeRow(completed[ci]));
                    list.appendChild(cl);
                }
            }
            frag.appendChild(list);

            // Footer
            var footer = document.createElement('div');
            footer.className = 'footer';
            var fc = document.createElement('span');
            fc.className = 'footer-count';
            fc.textContent = active.length + ' active \u00b7 ' + completed.length + ' done';
            footer.appendChild(fc);
            var fn = document.createElement('span');
            fn.className = 'footer-note';
            fn.textContent = 'Auto-refreshes every 2 min';
            footer.appendChild(fn);
            frag.appendChild(footer);

            while (app.firstChild) app.removeChild(app.firstChild);
            app.appendChild(frag);

            // Re-focus search if it was active
            if (searchQuery) {
                var si2 = app.querySelector('.search-input');
                if (si2) { si2.focus(); si2.setSelectionRange(si2.value.length, si2.value.length); }
            }
        }

        load();
    })();
    </script>
</body>
</html>
