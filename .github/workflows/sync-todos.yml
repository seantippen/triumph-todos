name: Sync Notion Todos

on:
  schedule:
    - cron: '*/15 12-23 * * 1-5'  # Every 15 min, ~8am-7pm ET, Mon-Fri
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Sync todos to data.js
        run: python sync_web.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "Sean Tippen"
          git config user.email "github@seantippen.com"
          git add docs/data.js
          if ! git diff --staged --quiet; then
            git commit -m "sync: update todos $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "No changes to commit"
          fi
