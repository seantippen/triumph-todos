<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Dashboard</title>
    <meta http-equiv="refresh" content="300">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:        #0a0d12;
            --surface:   #0e1423;
            --surface2:  #121a2a;
            --input:     #162033;
            --border:    #1e2230;
            --text:      #e2e8f0;
            --text-dim:  #94a3b8;
            --text-muted:#64748b;
            --green:     #22c55e;
            --green-dim: rgba(34, 197, 94, 0.15);
            --blue:      #3b82f6;
            --blue-dim:  rgba(59, 130, 246, 0.12);
            --yellow:    #fbbf24;
            --red:       #f87171;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(circle, rgba(34, 197, 94, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -30%;
            width: 160%;
            height: 180%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(34, 197, 94, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 40%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px 40px;
        }

        /* ── Header ─────────────────────────────────────── */
        header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(10, 13, 18, 0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            margin: 0 -16px;
            padding: 0 16px;
        }

        .accent-bar {
            height: 3px;
            background: linear-gradient(90deg, var(--green), var(--blue));
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header-sync {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
        }

        .header-sync.stale { color: var(--yellow); }
        .header-sync.error { color: var(--red); }

        /* ── Progress ───────────────────────────────────── */
        .progress-section {
            padding: 14px 0 0;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .progress-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-dim);
        }

        .progress-pct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
        }

        .progress-track {
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            background: var(--green);
            transition: width 0.4s ease, background 0.4s ease;
        }

        .progress-fill.low { background: var(--text-dim); }
        .progress-fill.mid { background: var(--blue); }
        .progress-fill.high { background: var(--green); }

        /* ── Filters ────────────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0 8px;
        }

        .filter-group {
            display: flex;
            gap: 2px;
            background: var(--surface2);
            border-radius: 6px;
            padding: 2px;
        }

        .filter-btn {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            background: transparent;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .filter-btn:hover { color: var(--text); }
        .filter-btn.active {
            color: var(--text);
            background: var(--surface);
        }

        .item-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ── Todo List ──────────────────────────────────── */
        .todo-list {
            padding-top: 4px;
        }

        .group-heading {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 0 8px;
        }

        .group-heading:first-child { padding-top: 8px; }

        .group-heading h3 {
            font-size: 13px;
            font-weight: 600;
            color: #34d399;
            letter-spacing: -0.01em;
        }

        .group-heading .badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
        }

        .todo-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 3px;
            transition: background 0.15s ease;
        }

        .todo-row:hover { background: var(--surface2); }

        .todo-pip {
            width: 3px;
            min-height: 18px;
            align-self: stretch;
            background: var(--green);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .todo-check {
            width: 16px;
            height: 16px;
            margin-top: 2px;
            flex-shrink: 0;
            border-radius: 3px;
            border: 1.5px solid var(--border);
            background: var(--input);
        }

        .todo-check.checked {
            background: var(--green-dim);
            border-color: var(--green);
            position: relative;
        }

        .todo-check.checked::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 4.5px;
            width: 4px;
            height: 8px;
            border: solid var(--green);
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .todo-text {
            font-size: 13px;
            line-height: 1.5;
            color: var(--text);
            flex: 1;
        }

        .todo-row.completed .todo-text {
            color: var(--text-dim);
            text-decoration: line-through;
        }

        .todo-row.completed .todo-pip { display: none; }

        .todo-row.completed {
            background: var(--surface2);
            border-color: transparent;
        }

        /* ── Completed Toggle ───────────────────────────── */
        .completed-divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0 0;
        }

        .completed-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            cursor: pointer;
            user-select: none;
        }

        .completed-toggle:hover .toggle-label { color: var(--text); }

        .toggle-arrow {
            font-size: 11px;
            color: var(--text-dim);
            transition: transform 0.15s ease;
            display: inline-block;
        }

        .toggle-arrow.open { transform: rotate(90deg); }

        .toggle-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            transition: color 0.15s ease;
        }

        .toggle-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--green);
            background: var(--surface2);
            padding: 1px 7px;
            border-radius: 10px;
        }

        .completed-list {
            display: none;
        }

        .completed-list.open { display: block; }

        /* ── Empty State ────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 60px 0;
        }

        .empty-state h3 {
            font-size: 15px;
            color: var(--text-dim);
            font-weight: 500;
        }

        .empty-state p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* ── Footer ─────────────────────────────────────── */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            margin-top: 8px;
            border-top: 1px solid var(--border);
        }

        .footer-count {
            font-size: 12px;
            color: var(--text-dim);
        }

        .footer-note {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ── Waiting State ──────────────────────────────── */
        .waiting {
            text-align: center;
            padding: 80px 0;
        }

        .waiting h3 {
            font-size: 16px;
            color: var(--text-dim);
        }

        .waiting p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .waiting .dot-pulse {
            display: inline-block;
            animation: pulse 1.4s infinite;
        }

        @keyframes pulse {
            0%, 80% { opacity: 1; }
            40% { opacity: 0.3; }
        }

        /* ── Responsive ─────────────────────────────────── */
        @media (max-width: 480px) {
            .container { padding: 0 12px 32px; }
            header { margin: 0 -12px; padding: 0 12px; }
            .header-title { font-size: 16px; }
            .todo-row { padding: 8px 10px; }
            .filter-btn { padding: 5px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <script src="data.js"></script>
    <div class="container">
        <header>
            <div class="accent-bar"></div>
            <div class="header-inner">
                <div class="header-title">To-Do Dashboard</div>
                <div class="header-sync" id="sync-status">Loading...</div>
            </div>
        </header>

        <div id="app"></div>
    </div>

    <script>
    (function() {
        var app = document.getElementById('app');
        var filterMode = 'all';
        var completedExpanded = false;

        function esc(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function init() {
            if (!DATA || !DATA.lastSynced) {
                app.textContent = '';
                var w = document.createElement('div');
                w.className = 'waiting';
                var h = document.createElement('h3');
                var dot = document.createElement('span');
                dot.className = 'dot-pulse';
                dot.textContent = '\u25cf';
                h.appendChild(dot);
                h.appendChild(document.createTextNode(' Waiting for first sync'));
                var p = document.createElement('p');
                p.textContent = 'The GitHub Action hasn\'t run yet. Trigger it manually or wait for the next scheduled run.';
                w.appendChild(h);
                w.appendChild(p);
                app.appendChild(w);
                return;
            }
            updateSyncStatus();
            render();
        }

        function updateSyncStatus() {
            var el = document.getElementById('sync-status');
            if (!DATA.lastSynced) { el.textContent = 'Not synced'; el.className = 'header-sync error'; return; }
            var synced = new Date(DATA.lastSynced);
            var ago = Math.round((Date.now() - synced.getTime()) / 60000);
            if (ago < 1) { el.textContent = 'Synced just now'; }
            else if (ago < 60) { el.textContent = 'Synced ' + ago + 'm ago'; }
            else if (ago < 1440) { el.textContent = 'Synced ' + Math.round(ago / 60) + 'h ago'; }
            else { el.textContent = 'Synced ' + Math.round(ago / 1440) + 'd ago'; }
            el.className = 'header-sync' + (ago > 30 ? ' stale' : '');
        }

        function getTodayStr() {
            var d = new Date();
            return d.getFullYear() + '-' +
                   String(d.getMonth() + 1).padStart(2, '0') + '-' +
                   String(d.getDate()).padStart(2, '0');
        }

        function getWeekRange() {
            var today = new Date();
            var day = today.getDay();
            var monday = new Date(today);
            monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
            var sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            return { start: fmtDate(monday), end: fmtDate(sunday) };
        }

        function fmtDate(d) {
            return d.getFullYear() + '-' +
                   String(d.getMonth() + 1).padStart(2, '0') + '-' +
                   String(d.getDate()).padStart(2, '0');
        }

        function extractDate(heading) {
            var m = heading.match(/(\d{4}-\d{2}-\d{2})/);
            return m ? m[1] : null;
        }

        function filterTodos() {
            var todayStr = getTodayStr();
            var source = DATA.todos;

            if (filterMode === 'today') {
                source = source.filter(function(t) { return t.heading.indexOf(todayStr) !== -1; });
            } else if (filterMode === 'week') {
                var range = getWeekRange();
                source = source.filter(function(t) {
                    var d = extractDate(t.heading);
                    return d && d >= range.start && d <= range.end;
                });
            }

            var active = [];
            var completed = [];
            for (var i = 0; i < source.length; i++) {
                var t = source[i];
                if (!t.checked) {
                    active.push(t);
                } else {
                    var d = extractDate(t.heading);
                    if (!d || d === todayStr) completed.push(t);
                }
            }
            return { active: active, completed: completed };
        }

        function todayProgress() {
            var todayStr = getTodayStr();
            var todayTodos = DATA.todos.filter(function(t) { return t.heading.indexOf(todayStr) !== -1; });
            var done = todayTodos.filter(function(t) { return t.checked; }).length;
            return { done: done, total: todayTodos.length };
        }

        function groupByHeading(todos) {
            var groups = [];
            var map = {};
            for (var i = 0; i < todos.length; i++) {
                var t = todos[i];
                if (!map[t.heading]) {
                    map[t.heading] = [];
                    groups.push({ heading: t.heading, items: map[t.heading] });
                }
                map[t.heading].push(t);
            }
            return groups;
        }

        function render() {
            var result = filterTodos();
            var active = result.active;
            var completed = result.completed;
            var progress = todayProgress();
            var pct = progress.total > 0 ? Math.round((progress.done / progress.total) * 100) : 0;
            var pctWidth = progress.total > 0 ? (progress.done / progress.total) * 100 : 0;
            var fillClass = pct >= 75 ? 'high' : pct >= 40 ? 'mid' : 'low';
            var pctColor = pct >= 75 ? 'var(--green)' : pct >= 40 ? 'var(--blue)' : 'var(--text-dim)';

            // Build DOM
            var frag = document.createDocumentFragment();

            // Progress section
            var progressEl = document.createElement('div');
            progressEl.className = 'progress-section';
            var ph = document.createElement('div');
            ph.className = 'progress-header';
            var plabel = document.createElement('span');
            plabel.className = 'progress-label';
            plabel.textContent = progress.total > 0 ? 'Today: ' + progress.done + '/' + progress.total + ' done' : 'Today: no tasks';
            ph.appendChild(plabel);
            if (progress.total > 0) {
                var ppct = document.createElement('span');
                ppct.className = 'progress-pct';
                ppct.style.color = pctColor;
                ppct.textContent = pct + '%';
                ph.appendChild(ppct);
            }
            progressEl.appendChild(ph);
            var track = document.createElement('div');
            track.className = 'progress-track';
            var fill = document.createElement('div');
            fill.className = 'progress-fill ' + fillClass;
            fill.style.width = pctWidth + '%';
            track.appendChild(fill);
            progressEl.appendChild(track);
            frag.appendChild(progressEl);

            // Toolbar
            var toolbar = document.createElement('div');
            toolbar.className = 'toolbar';
            var fg = document.createElement('div');
            fg.className = 'filter-group';
            var filters = [['All', 'all'], ['Today', 'today'], ['This Week', 'week']];
            for (var fi = 0; fi < filters.length; fi++) {
                var btn = document.createElement('button');
                btn.className = 'filter-btn' + (filterMode === filters[fi][1] ? ' active' : '');
                btn.textContent = filters[fi][0];
                btn.setAttribute('data-mode', filters[fi][1]);
                btn.addEventListener('click', function() {
                    filterMode = this.getAttribute('data-mode');
                    render();
                });
                fg.appendChild(btn);
            }
            toolbar.appendChild(fg);
            var ic = document.createElement('span');
            ic.className = 'item-count';
            ic.textContent = active.length + ' active';
            toolbar.appendChild(ic);
            frag.appendChild(toolbar);

            // Todo list
            var list = document.createElement('div');
            list.className = 'todo-list';

            if (active.length === 0 && completed.length === 0) {
                var msg = filterMode === 'today' ? 'No tasks for today' : filterMode === 'week' ? 'No tasks this week' : 'No tasks';
                var empty = document.createElement('div');
                empty.className = 'empty-state';
                var eh = document.createElement('h3');
                eh.textContent = msg;
                var ep = document.createElement('p');
                ep.textContent = 'Check back later.';
                empty.appendChild(eh);
                empty.appendChild(ep);
                list.appendChild(empty);
            } else {
                // Active groups
                var groups = groupByHeading(active);
                for (var gi = 0; gi < groups.length; gi++) {
                    var g = groups[gi];
                    var gh = document.createElement('div');
                    gh.className = 'group-heading';
                    var ghTitle = document.createElement('h3');
                    ghTitle.textContent = g.heading;
                    gh.appendChild(ghTitle);
                    var ghBadge = document.createElement('span');
                    ghBadge.className = 'badge';
                    ghBadge.textContent = g.items.length;
                    gh.appendChild(ghBadge);
                    list.appendChild(gh);

                    for (var ti = 0; ti < g.items.length; ti++) {
                        var row = document.createElement('div');
                        row.className = 'todo-row';
                        var pip = document.createElement('div');
                        pip.className = 'todo-pip';
                        row.appendChild(pip);
                        var check = document.createElement('div');
                        check.className = 'todo-check';
                        row.appendChild(check);
                        var txt = document.createElement('span');
                        txt.className = 'todo-text';
                        txt.textContent = g.items[ti].text;
                        row.appendChild(txt);
                        list.appendChild(row);
                    }
                }

                // Completed section
                if (completed.length > 0) {
                    var divider = document.createElement('div');
                    divider.className = 'completed-divider';
                    list.appendChild(divider);

                    var toggle = document.createElement('div');
                    toggle.className = 'completed-toggle';
                    toggle.addEventListener('click', function() {
                        completedExpanded = !completedExpanded;
                        render();
                    });
                    var arrow = document.createElement('span');
                    arrow.className = 'toggle-arrow' + (completedExpanded ? ' open' : '');
                    arrow.textContent = '\u25b8';
                    toggle.appendChild(arrow);
                    var tlabel = document.createElement('span');
                    tlabel.className = 'toggle-label';
                    tlabel.textContent = 'Completed today';
                    toggle.appendChild(tlabel);
                    var tbadge = document.createElement('span');
                    tbadge.className = 'toggle-badge';
                    tbadge.textContent = completed.length;
                    toggle.appendChild(tbadge);
                    list.appendChild(toggle);

                    var clist = document.createElement('div');
                    clist.className = 'completed-list' + (completedExpanded ? ' open' : '');
                    for (var ci = 0; ci < completed.length; ci++) {
                        var crow = document.createElement('div');
                        crow.className = 'todo-row completed';
                        var ccheck = document.createElement('div');
                        ccheck.className = 'todo-check checked';
                        crow.appendChild(ccheck);
                        var ctxt = document.createElement('span');
                        ctxt.className = 'todo-text';
                        ctxt.textContent = completed[ci].text;
                        crow.appendChild(ctxt);
                        clist.appendChild(crow);
                    }
                    list.appendChild(clist);
                }
            }
            frag.appendChild(list);

            // Footer
            var footer = document.createElement('div');
            footer.className = 'footer';
            var fcount = document.createElement('span');
            fcount.className = 'footer-count';
            fcount.textContent = active.length + ' active \u00b7 ' + completed.length + ' done today';
            footer.appendChild(fcount);
            var fnote = document.createElement('span');
            fnote.className = 'footer-note';
            fnote.textContent = 'Read-only view \u00b7 Auto-refreshes every 5 min';
            footer.appendChild(fnote);
            frag.appendChild(footer);

            // Replace content
            while (app.firstChild) app.removeChild(app.firstChild);
            app.appendChild(frag);
        }

        init();
    })();
    </script>
</body>
</html>
